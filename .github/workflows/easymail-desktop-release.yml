name: EasyMail desktop release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: easymail-desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - label: macOS arm64
            os: macos-14
            target: --mac --arm64
          - label: Windows x64
            os: windows-latest
            target: --win --x64
          - label: Linux x64
            os: ubuntu-latest
            target: --linux --x64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HAS_MACOS_CERTIFICATE: ${{ secrets.MACOS_CSC_LINK != '' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - name: Verify release version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          test "$GITHUB_REF_NAME" = "v$VERSION"
      - name: Ensure GitHub release exists
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v$VERSION"
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --target "$GITHUB_SHA" --title "$VERSION" --generate-notes
      - name: Report macOS signing mode
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if test "$HAS_MACOS_CERTIFICATE" = "true"; then
            echo "Building a signed macOS release."
          else
            echo "Signing secrets are not configured; publishing an unsigned community build."
          fi
      - run: npm ci
      - run: npm run runtime:prepare
      - name: Publish signed macOS release
        if: runner.os == 'macOS' && env.HAS_MACOS_CERTIFICATE == 'true'
        env:
          CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder ${{ matrix.target }} --publish always
      - name: Publish unsigned macOS release
        if: runner.os == 'macOS' && env.HAS_MACOS_CERTIFICATE != 'true'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder ${{ matrix.target }} --publish always
      - name: Publish desktop release
        if: runner.os != 'macOS'
        run: npx electron-builder ${{ matrix.target }} --publish always
