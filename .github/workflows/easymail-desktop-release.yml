name: EasyMail desktop release

on:
  push:
    tags:
      - 'easymail-v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: easymail-desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - label: macOS arm64
            os: macos-14
            target: --mac --arm64
          - label: Windows x64
            os: windows-latest
            target: --win --x64
          - label: Linux x64
            os: ubuntu-latest
            target: --linux --x64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
      CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.MACOS_CSC_LINK != '' && 'true' || 'false' }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - name: Verify release version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          test "$GITHUB_REF_NAME" = "easymail-v$VERSION"
      - name: Report macOS signing mode
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if test -n "$CSC_LINK"; then
            echo "Building a signed macOS release."
          else
            echo "Signing secrets are not configured; publishing an unsigned community build."
          fi
      - run: npm ci
      - run: npm run runtime:prepare
      - run: npx electron-builder ${{ matrix.target }} --publish always
