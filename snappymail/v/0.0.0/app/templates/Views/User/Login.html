<div class="descWrapper" data-bind="visible: '' !== loadingDesc, text: loadingDesc"></div>
<div class="alert" data-bind="hidden: !submitError()" hidden="">
	<a href="#" class="close" data-bind="click: hideError"><span class="g-icon g-icon--xmark" aria-hidden="true"></span></a>
	<span data-bind="text: submitError"></span>
	<p data-bind="visible: '' !== submitErrorAdditional()">
		<span data-i18n="GLOBAL/SERVER_MESSAGE"></span>:
		<!-- ko text: submitErrorAdditional --><!-- /ko -->
	</p>
</div>
<form action="#/"  spellcheck="false" method="POST"
	data-bind="submit: submitForm, css: {'errorAnimated': formError, 'submitting': submitRequest(), 'manual-config': manualConfig}">
	<div class="controls" data-bind="css: {'error': emailError}">
		<span class="g-icon g-icon--envelope login-field-icon" aria-hidden="true"></span>
		<input name="Email" required="" type="text" class="input-block-level" pattern="[^@\s]+(@[^\s]+)?" inputmode="email"
			autofocus="" autocomplete="email" autocorrect="off" autocapitalize="off"
			data-bind="textInput: email, disable: submitRequest"
			data-i18n="[placeholder]GLOBAL/EMAIL">
	</div>
	<div class="controls" data-bind="css: {'error': passwordError}">
		<span class="g-icon g-icon--key login-field-icon" aria-hidden="true"></span>
		<input name="Password" required="" type="password" class="input-block-level"
			autocomplete="current-password" autocorrect="off" autocapitalize="off"
			data-bind="textInput: password, disable: submitRequest"
			data-i18n="[placeholder]GLOBAL/PASSWORD">
	</div>
	<div id="plugin-Login-BottomControlGroup"></div>
	<button type="button" class="manual-config-toggle" data-bind="click: toggleManualConfig">
		<span class="g-icon g-icon--gear" aria-hidden="true"></span>
		<span data-i18n="LOGIN/MANUAL_CONFIG"></span>
	</button>
	<section class="manual-server-settings" data-bind="visible: manualConfig">
		<h3 data-i18n="LOGIN/MANUAL_TITLE"></h3>
		<div class="manual-server-row">
			<label for="login-imap-host">IMAP</label>
			<input id="login-imap-host" name="DesktopImapHost" type="text" autocomplete="off" autocorrect="off" autocapitalize="off"
				data-bind="textInput: imapHost, attr: {required: manualConfig}"
				data-i18n="[placeholder]LOGIN/SERVER_HOST">
			<input name="DesktopImapPort" type="number" min="1" max="65535" step="1"
				data-bind="textInput: imapPort, attr: {required: manualConfig}"
				data-i18n="[aria-label]LOGIN/PORT">
			<select name="DesktopImapType" data-bind="value: imapType" data-i18n="[aria-label]LOGIN/SECURITY">
				<option value="1">SSL/TLS</option>
				<option value="2">STARTTLS</option>
				<option value="0" data-i18n="LOGIN/SECURITY_NONE"></option>
			</select>
		</div>
		<div class="manual-server-row">
			<label for="login-smtp-host">SMTP</label>
			<input id="login-smtp-host" name="DesktopSmtpHost" type="text" autocomplete="off" autocorrect="off" autocapitalize="off"
				data-bind="textInput: smtpHost, attr: {required: manualConfig}"
				data-i18n="[placeholder]LOGIN/SERVER_HOST">
			<input name="DesktopSmtpPort" type="number" min="1" max="65535" step="1"
				data-bind="textInput: smtpPort, attr: {required: manualConfig}"
				data-i18n="[aria-label]LOGIN/PORT">
			<select name="DesktopSmtpType" data-bind="value: smtpType" data-i18n="[aria-label]LOGIN/SECURITY">
				<option value="1">SSL/TLS</option>
				<option value="2">STARTTLS</option>
				<option value="0" data-i18n="LOGIN/SECURITY_NONE"></option>
			</select>
		</div>
	</section>
	<div class="controls" style="display: flex">
		<div class="e-checkbox" tabindex="0" data-bind="toggle: signMe">
			<i role="checkbox" class="fontastic" data-bind="text: signMe() ? '☑' : '☐'"></i>
			<span data-i18n="LOGIN/LABEL_SIGN_ME"></span>
		</div>
		<div class="language-buttons">
			<a href="#" class="language-button fontastic"
				data-bind="visible: allowLanguagesOnLogin, click: selectLanguage, css: { 'icon-spinner' : langRequest }"
				data-i18n="[title]POPUPS_LANGUAGES/TITLE_LANGUAGES">
				🌍
			</a>
		</div>
	</div>
	<div>
		<button class="btn btn-large buttonLogin"
			data-bind="command: submitCommand"
			data-i18n="LOGIN/BUTTON_SIGN_IN"></button>
	</div>
</form>
