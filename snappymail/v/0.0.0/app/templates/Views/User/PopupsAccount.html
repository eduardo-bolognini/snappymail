<header>
	<a href="#" class="close" data-bind="click: close">×</a>
	<h3 data-bind="visible: isNew" data-i18n="POPUPS_ADD_ACCOUNT/TITLE_ADD_ACCOUNT"></h3>
	<h3 data-bind="visible: !isNew()" data-i18n="POPUPS_ADD_ACCOUNT/TITLE_UPDATE_ACCOUNT"></h3>
</header>
<form id="accountform" class="modal-body form-horizontal" autocomplete="off" spellcheck="false" data-bind="submit: submitForm">
	<div class="alert" data-bind="visible: '' !== submitError()">
		<a href="#" class="close" data-bind="click: hideError">×</a>
		<span data-bind="text: submitError"></span>
		<div data-bind="visible: submitErrorAdditional, text: submitErrorAdditional"></div>
	</div>
	<div class="control-group">
		<label data-i18n="GLOBAL/EMAIL"></label>
		<strong style="margin-top: 5px;" data-bind="visible: !isNew(), text: email"></strong>
		<input name="email" type="text" class="input-xlarge"
			autofocus="" autocorrect="off" autocapitalize="off"
			data-bind="visible: isNew, textInput: email, attr: {required: isNew}">
	</div>
	<div class="control-group">
		<label data-i18n="GLOBAL/PASSWORD"></label>
		<input name="password" type="password" class="input-xlarge" autocomplete="new-password" autocorrect="off" autocapitalize="off"
			data-bind="value: password, attr: {required:isNew}">
	</div>
	<div class="control-group">
		<label data-i18n="GLOBAL/NAME"></label>
		<input name="name" type="text" class="input-xlarge" data-bind="value: name">
	</div>
	<button type="button" class="account-manual-config-toggle" data-bind="visible: isNew, click: toggleManualConfig">
		<span class="fontastic">⚙</span>
		<span data-i18n="LOGIN/MANUAL_CONFIG"></span>
	</button>
	<section class="account-manual-server-settings" data-bind="visible: isNew() && manualConfig()">
		<h4 data-i18n="LOGIN/MANUAL_TITLE"></h4>
		<div class="account-manual-server-row">
			<label for="account-imap-host">IMAP</label>
			<input id="account-imap-host" name="DesktopImapHost" type="text" autocomplete="off" autocorrect="off" autocapitalize="off"
				data-bind="textInput: imapHost, attr: {required: manualConfig}"
				data-i18n="[placeholder]LOGIN/SERVER_HOST">
			<input name="DesktopImapPort" type="number" min="1" max="65535" step="1"
				data-bind="textInput: imapPort, attr: {required: manualConfig}"
				data-i18n="[aria-label]LOGIN/PORT">
			<select name="DesktopImapType" data-bind="value: imapType" data-i18n="[aria-label]LOGIN/SECURITY">
				<option value="1">SSL/TLS</option>
				<option value="2">STARTTLS</option>
				<option value="0" data-i18n="LOGIN/SECURITY_NONE"></option>
			</select>
		</div>
		<div class="account-manual-server-row">
			<label for="account-smtp-host">SMTP</label>
			<input id="account-smtp-host" name="DesktopSmtpHost" type="text" autocomplete="off" autocorrect="off" autocapitalize="off"
				data-bind="textInput: smtpHost, attr: {required: manualConfig}"
				data-i18n="[placeholder]LOGIN/SERVER_HOST">
			<input name="DesktopSmtpPort" type="number" min="1" max="65535" step="1"
				data-bind="textInput: smtpPort, attr: {required: manualConfig}"
				data-i18n="[aria-label]LOGIN/PORT">
			<select name="DesktopSmtpType" data-bind="value: smtpType" data-i18n="[aria-label]LOGIN/SECURITY">
				<option value="1">SSL/TLS</option>
				<option value="2">STARTTLS</option>
				<option value="0" data-i18n="LOGIN/SECURITY_NONE"></option>
			</select>
		</div>
	</section>
</form>
<footer>
	<button form="accountform" class="btn buttonAddAccount">
		<i data-bind="visible: isNew, css: {'icon-user-add': !submitRequest(), 'icon-spinner': submitRequest()}"></i>
		<span data-bind="visible: isNew" data-i18n="POPUPS_ADD_ACCOUNT/BUTTON_ADD_ACCOUNT"></span>
		<i data-bind="visible: !isNew(), css: {'icon-ok': !submitRequest(), 'icon-spinner': submitRequest()}"></i>
		<span data-bind="visible: !isNew()" data-i18n="GLOBAL/SAVE"></span>
	</button>
</footer>
